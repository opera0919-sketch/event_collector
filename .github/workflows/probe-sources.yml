name: probe-sources

on:
  workflow_dispatch:
  push:
    branches:
      - claude/pension-event-monitoring-8lfq26
      - claude/pension-event-data-collection-u6gtn1
    paths:
      - 'scripts/probe_sources.py'
      - '.github/workflows/probe-sources.yml'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          pip install playwright requests beautifulsoup4
          playwright install --with-deps chromium
      - name: Run probe
        run: python scripts/probe_sources.py
      - name: Commit findings
        if: always()
        run: |
          git config user.name "pension-monitor-bot"
          git config user.email "noreply@github.com"
          git add data/probe_findings.json || true
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: 소스 조사 결과 probe_findings.json"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }}
          fi
