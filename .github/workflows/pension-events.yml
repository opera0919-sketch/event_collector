name: pension-events

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 09:00 KST
  workflow_dispatch:
  push:
    branches:
      - claude/pension-event-monitoring-8lfq26
    paths:
      - 'pension_monitor/**'
      - '.github/workflows/pension-events.yml'

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright requests beautifulsoup4 openpyxl
          playwright install --with-deps chromium

      - name: Run monitor
        env:
          TRIGGER_TYPE: ${{ github.event_name == 'schedule' && 'weekly' || 'manual' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAIL_SENDER: ${{ secrets.MAIL_SENDER }}
          MAIL_APP_PASSWORD: ${{ secrets.MAIL_APP_PASSWORD }}
          MAIL_RECIPIENTS: ${{ secrets.MAIL_RECIPIENTS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m pension_monitor.main

      - name: Commit data & report
        if: always()   # 메일 발송 실패 시에도 수집 결과는 보존
        run: |
          git config user.name "pension-monitor-bot"
          git config user.email "noreply@github.com"
          git add data/ reports/ || true
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: 연금 이벤트 수집 결과 $(date -u +%Y-%m-%d) (${{ github.event_name }})"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }}
          fi

# Secrets 등록 후 통합 테스트 트리거 3 (앱 비밀번호 교체 확인)
