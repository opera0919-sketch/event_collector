name: collect-test

# 상세-우선 수집 검증용: DB/메일 없이 --collect-only 로 수집·분류만 수행하고
# data/events_latest.json 을 커밋 + Step Summary 로 품질을 확인한다. (수동 실행 전용)
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install playwright requests beautifulsoup4 openpyxl
          playwright install --with-deps chromium
      - name: Collect only (no DB/mail; OCR on detail-page images)
        env:
          DEBUG: '1'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m pension_monitor.main --collect-only
      - name: Step summary (수집·혜택 품질 요약)
        if: always()
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          try:
              d = json.load(open("data/events_latest.json"))
          except Exception as e:
              print(f"events_latest.json 읽기 실패: {e}"); raise SystemExit(0)
          evs = d.get("events", [])
          from collections import Counter
          byf = Counter(e["firm_name"] for e in evs)
          filled = sum(1 for e in evs if e.get("benefits"))
          print(f"## collect-test 결과 ({d.get('collected_at','')})\n")
          print(f"- 수집 실패 증권사: {d.get('firms_failed') or '없음'}")
          print(f"- 연금 이벤트: **{len(evs)}건** · 혜택 채워짐: **{filled}/{len(evs)}**")
          print(f"- 증권사별: {dict(byf)}\n")
          print("| 증권사 | 이벤트 | 혜택(앞 120자) |")
          print("|---|---|---|")
          for e in evs:
              b = (e.get("benefits") or "(없음)").replace("|"," ")[:120]
              print(f"| {e['firm_name']} | {e['event_name'][:28]} | {b} |")
          PY
      - name: Commit collected data
        if: always()
        run: |
          git config user.name "pension-monitor-bot"
          git config user.email "noreply@github.com"
          git add data/ || true
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "test: collect-only 수집 결과 (상세-우선 검증)"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }}
          fi
