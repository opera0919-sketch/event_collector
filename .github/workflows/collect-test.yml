name: collect-test

# 상세-우선 수집 검증용: DB/메일 없이 --collect-only 로 수집·분류만 수행하고
# data/events_latest.json 을 브랜치에 커밋해 세션에서 품질을 확인한다.
on:
  workflow_dispatch:
  push:
    branches:
      - claude/pension-event-data-collection-u6gtn1
    paths:
      - 'pension_monitor/**'
      - '.github/workflows/collect-test.yml'

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install playwright requests beautifulsoup4
          playwright install --with-deps chromium
      - name: Collect only (no DB/mail; OCR on detail-page images)
        env:
          DEBUG: '1'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m pension_monitor.main --collect-only
      - name: Commit collected data
        if: always()
        run: |
          git config user.name "pension-monitor-bot"
          git config user.email "noreply@github.com"
          git add data/ || true
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "test: collect-only 수집 결과 (상세-우선 검증)"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }}
          fi
